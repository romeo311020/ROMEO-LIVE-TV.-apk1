<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ROMEO LIVE - Professional</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #040714;
            --card-color: #121826;
            --accent-gold: #e5b80b;
            --text-color: #ffffff;
            --nav-height: 70px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); margin: 0; overflow-x: hidden; padding-bottom: 90px; }

        /* Splash Screen */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-color); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999; transition: 0.5s;
        }

        /* Header */
        header {
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(4, 7, 20, 0.95); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px);
        }
        .brand { font-size: 22px; font-weight: 900; color: var(--accent-gold); letter-spacing: 1px; }
        .user-actions { display: flex; gap: 15px; align-items: center; }
        .icon-btn { font-size: 20px; color: white; cursor: pointer; position: relative; }

        /* Banner */
        .main-banner {
            width: 92%; margin: 10px auto 25px; height: 180px; border-radius: 20px;
            background: linear-gradient(45deg, #161d2f, #040714); overflow: hidden;
            position: relative; border: 1px solid rgba(229, 184, 11, 0.2);
        }
        .main-banner img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }

        /* الأقسام (View Sections) */
        .view-section { display: none; padding: 0 15px; animation: fadeIn 0.4s ease; }
        .view-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .section-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;
        }
        .section-title { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .section-title::before { content: ''; width: 4px; height: 18px; background: var(--accent-gold); border-radius: 2px; }

        /* Grid System - نفس شكل الصورة */
        .grid-container {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
        }
        .item-card {
            background: var(--card-color); border-radius: 12px; overflow: hidden;
            transition: 0.3s; border: 1px solid rgba(255,255,255,0.05); cursor: pointer;
        }
        .item-card:active { transform: scale(0.95); }
        .item-card img { width: 100%; height: 110px; object-fit: cover; }
        .item-card .info { padding: 8px; text-align: center; }
        .item-card .name { font-size: 11px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; background: #10141e;
            display: grid; grid-template-columns: repeat(6, 1fr); padding: 10px 5px;
            border-top: 1px solid rgba(255,255,255,0.1); z-index: 1000;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            color: #717171; font-size: 10px; transition: 0.3s;
        }
        .nav-item i { font-size: 18px; }
        .nav-item.active { color: var(--accent-gold); }

        /* Notifications UI */
        .notif-item {
            background: var(--card-color); padding: 15px; border-radius: 12px; margin-bottom: 10px;
            border-right: 4px solid var(--accent-gold);
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <h1 style="color:var(--accent-gold); font-size: 40px;">ROMEO</h1>
        <div class="loader"></div>
    </div>

    <header>
        <div class="brand">ROMEO LIVE</div>
        <div class="user-actions">
            <i class="fas fa-search icon-btn"></i>
            <i class="fas fa-user-circle icon-btn" onclick="alert('حساب المستخدم قريباً')"></i>
        </div>
    </header>

    <main id="main-content">
        <section id="home" class="view-section active">
            <div class="main-banner">
                <img src="https://wallpaperaccess.com/full/229012.jpg" alt="Promo">
                <div style="position:absolute; bottom:15px; right:15px;">
                    <h2 style="margin:0; font-size:18px;">عالم الترفيه بين يديك</h2>
                </div>
            </div>
            <div class="section-header"><div class="section-title">أحدث الإضافات</div></div>
            <div class="grid-container" id="container-home"></div>
        </section>

        <section id="movies" class="view-section">
            <div class="section-header"><div class="section-title">الأفلام الحصرية</div></div>
            <div class="grid-container" id="container-movies"></div>
        </section>

        <section id="music" class="view-section">
            <div class="section-header"><div class="section-title">أحدث الأغاني</div></div>
            <div class="grid-container" id="container-music"></div>
        </section>

        <section id="series" class="view-section">
            <div class="section-header"><div class="section-title">مسلسلات رمضان</div></div>
            <div class="grid-container" id="container-series"></div>
        </section>

        <section id="notifs" class="view-section">
            <div class="section-header"><div class="section-title">تنبيهات النظام</div></div>
            <div id="container-notifs">
                <div class="notif-item">أهلاً بك في تطبيق روميو لايف الجديد.</div>
            </div>
        </section>

        <section id="matches" class="view-section">
            <div class="section-header"><div class="section-title">جدول المباريات</div></div>
            <div class="grid-container" id="container-matches"></div>
        </section>
    </main>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="showView('home', this)"><i class="fas fa-home"></i><span>الرئيسية</span></div>
        <div class="nav-item" onclick="showView('movies', this)"><i class="fas fa-film"></i><span>أفلام</span></div>
        <div class="nav-item" onclick="showView('series', this)"><i class="fas fa-tv"></i><span>مسلسلات</span></div>
        <div class="nav-item" onclick="showView('music', this)"><i class="fas fa-music"></i><span>أغاني</span></div>
        <div class="nav-item" onclick="showView('matches', this)"><i class="fas fa-football-ball"></i><span>مباريات</span></div>
        <div class="nav-item" onclick="showView('notifs', this)"><i class="fas fa-bell"></i><span>تنبيهات</span></div>
    </nav>

    <script>
        // 1. التحكم في الشاشات
        function showView(viewId, el) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            el.classList.add('active');
            window.scrollTo(0,0);
        }

        // 2. جلب البيانات من JSON وتوزيعها
        async function fetchRomeoData() {
            const url = "https://raw.githubusercontent.com/romeo311020/ROMEO-LIVE-TV-/main/data.json";
            try {
                const response = await fetch(url);
                const data = await response.json();
                
                if(data.items) {
                    renderData(data.items);
                }
            } catch (e) { console.error("Data Fetch Error"); }
        }

        function renderData(items) {
            const containers = {
                home: document.getElementById('container-home'),
                movies: document.getElementById('container-movies'),
                music: document.getElementById('container-music'),
                series: document.getElementById('container-series'),
                matches: document.getElementById('container-matches')
            };

            // مسح أي بيانات قديمة
            Object.values(containers).forEach(c => if(c) c.innerHTML = '');

            items.forEach(item => {
                const card = `
                    <div class="item-card" onclick="location.href='${item.link}'">
                        <img src="${item.img}" onerror="this.src='https://via.placeholder.com/150/121826/ffffff?text=ROMEO'">
                        <div class="info">
                            <div class="name">${item.name}</div>
                        </div>
                    </div>
                `;

                // إضافة للرئيسية (أحدث الإضافات)
                containers.home.insertAdjacentHTML('beforeend', card);

                // توزيع حسب التصنيف (Cat)
                if(item.cat === 'live-matches') containers.matches.insertAdjacentHTML('beforeend', card);
                else if(item.cat === 'egy-movies') containers.movies.insertAdjacentHTML('beforeend', card);
                else if(item.cat === 'music-hits') containers.music.insertAdjacentHTML('beforeend', card);
                else if(item.cat === 'ramadan') containers.series.insertAdjacentHTML('beforeend', card);
            });
        }

        // تشغيل عند التحميل
        window.onload = () => {
            fetchRomeoData();
            setTimeout(() => {
                document.getElementById('splash-screen').style.opacity = '0';
                setTimeout(() => document.getElementById('splash-screen').style.display = 'none', 500);
            }, 1500);
        };
    </script>
</body>
</html>
